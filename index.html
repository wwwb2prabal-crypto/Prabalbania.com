<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prabal Bania | Music Producer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff4b2b;
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --card-bg: rgba(26, 26, 26, 0.9);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('DF4E119E-B6D0-4E97-8285-31263F68FF0D.jpeg') no-repeat center center/cover;
            background-attachment: fixed;
        }

        h1 { font-size: 4.5rem; margin: 0; letter-spacing: 5px; text-transform: uppercase; }
        .subtitle { font-size: 1.2rem; letter-spacing: 3px; color: var(--primary-color); margin-top: 10px; }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        section { padding: 80px 0; }

        h2 { text-align: center; font-size: 2rem; margin-bottom: 40px; text-transform: uppercase; border-bottom: 2px solid var(--primary-color); display: inline-block; width: auto; margin-left: 50%; transform: translateX(-50%); padding-bottom: 10px; }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .social-container a {
            color: white;
            font-size: 3rem;
            transition: 0.4s ease;
        }

        .social-container a:hover {
            color: var(--primary-color);
            transform: scale(1.2);
        }

        .booking-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
        }

        .form-row { margin-bottom: 20px; }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; letter-spacing: 1px; }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-size: 0.8rem; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .social-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>PRABAL BANIA</h1>
        <div class="subtitle">MUSIC PRODUCER | ASSAM, INDIA</div>
    </header>

    <div class="container">
        <section>
            <h2>Find My Beats</h2>
            <div class="social-container">
                <a href="https://www.instagram.com/_.prabal.bania" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://youtube.com/@prabalbania" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </section>

        <section id="booking">
            <h2>Book For Shows</h2>
            <div class="booking-box">
                <form>
                    <div class="form-row">
                        <input type="text" placeholder="Your Name/Organization" required>
                    </div>
                    <div class="form-row">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-row">
                        <select>
                            <option>Club Gig</option>
                            <option>Festival</option>
                            <option>Studio Session</option>
                            <option>Private Event</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <textarea rows="4" placeholder="Tell me about the show (Date, Venue, etc.)"></textarea>
                    </div>
                    <button type="submit">Send Inquiry</button>
                </form>
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 PRABAL BANIA. CREATED IN ASSAM.
    </footer>

</body>
</html>
